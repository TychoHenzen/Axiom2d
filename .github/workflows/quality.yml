name: Quality

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: # Manual trigger

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions-rust-lang/audit@v1

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: lcov.info

  mutants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Run mutation tests
        run: cargo mutants --no-shuffle -vV --in-place --timeout 300
      - name: Show missed mutants
        if: always()
        run: |
          if [ -f mutants.out/outcomes.json ]; then
            jq -r '[.outcomes[] | select(.summary == "MissedMutant")] | .[] | "MISSED  \(.scenario.Mutant.name)"' mutants.out/outcomes.json
            missed=$(jq '[.outcomes[] | select(.summary == "MissedMutant")] | length' mutants.out/outcomes.json)
            caught=$(jq '[.outcomes[] | select(.summary == "CaughtMutant")] | length' mutants.out/outcomes.json)
            total=$((missed + caught))
            echo ""
            echo "${caught}/${total} caught, ${missed} missed"
            if [ "$missed" -gt 0 ]; then exit 1; fi
          fi
      - name: Archive mutants.out
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutants-out
          path: mutants.out
