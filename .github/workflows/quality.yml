name: Quality

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Clippy
        run: cargo clippy --workspace --all-targets --keep-going -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions-rust-lang/audit@v1
        with:
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: lcov.info

  udeps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      - name: Check for unused dependencies
        run: cargo +nightly udeps --workspace --all-targets

  shaders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install naga-cli
        run: cargo install naga-cli --locked
      - name: Validate WGSL shaders
        run: |
          preamble="crates/engine_render/src/wgpu_renderer/bloom_preamble.wgsl"
          find crates -name '*.wgsl' | while read -r shader; do
            echo "Validating $shader"
            case "$shader" in
              *bloom_frag.wgsl|*bloom_composite.wgsl)
                tmp=$(mktemp /tmp/shader_XXXXXX.wgsl)
                cat "$preamble" "$shader" > "$tmp"
                naga "$tmp"
                rm "$tmp"
                ;;
              *)
                naga "$shader"
                ;;
            esac
          done

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Check for dead code
        run: cargo build --workspace --all-targets
        env:
          RUSTFLAGS: "-D dead_code"

  duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install jscpd
        run: npm install -g jscpd
      - name: Detect duplicate code
        id: jscpd
        run: jscpd crates/ --pattern "**/*.rs" --min-tokens 50 --reporters consoleFull --output jscpd-report || echo "duplicates_found=true" >> "$GITHUB_OUTPUT"
      - name: Upload duplicate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jscpd-report
          path: jscpd-report/
      - name: Fail if duplicates found
        if: steps.jscpd.outputs.duplicates_found == 'true'
        run: exit 1

  micro-mutations:
    name: "Micro-mutations (randomized subset)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run micro-mutations
        id: mutations
        run: bash scripts/micro-mutations.sh
        continue-on-error: true

      - name: Commit tracking doc update
        if: always() && steps.mutations.outcome != 'skipped'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/MICRO_MUTATIONS.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update micro-mutation tracking (${{ github.run_number }})"
            git push
          else
            echo "No changes to tracking doc"
          fi

  soft-gate:
    name: "Soft Ratchet Gate (no regressions allowed)"
    runs-on: ubuntu-latest
    needs: [clippy, audit, doc, udeps, shaders, dead-code, duplicates]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v5

      - name: Parse baseline
        id: baseline
        run: |
          # Extract numeric baseline values from RON file
          test_count=$(grep '"test_count_total"' docs/QUALITY_BASELINE.ron | grep -o '[0-9]\+' | head -1)
          smell=$(grep '"smell_markers_total"' docs/QUALITY_BASELINE.ron | grep -o '[0-9]\+' | head -1)
          unsafe=$(grep '"unsafe_blocks_total"' docs/QUALITY_BASELINE.ron | grep -o '[0-9]\+' | head -1)
          unwrap=$(grep '"unwrap_in_prod_total"' docs/QUALITY_BASELINE.ron | grep -o '[0-9]\+' | head -1)
          echo "test_count=$test_count" >> "$GITHUB_OUTPUT"
          echo "smell=$smell" >> "$GITHUB_OUTPUT"
          echo "unsafe=$unsafe" >> "$GITHUB_OUTPUT"
          echo "unwrap=$unwrap" >> "$GITHUB_OUTPUT"

      - name: Count test functions
        id: tests
        run: |
          count=$(grep -rn '#\[test\]\|#\[tokio::test\]' crates/ --include="*.rs" | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Count smell markers (prod code only)
        id: smells
        run: |
          count=$(grep -rn 'TODO\|FIXME\|HACK' crates/ --include="*.rs" | grep -v 'tests/' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Count unsafe blocks (prod code only)
        id: unsafe_blocks
        run: |
          count=$(grep -rn '\bunsafe\b' crates/ --include="*.rs" | grep -v 'tests/' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Count unwrap() in production
        id: unwrap_count
        run: |
          count=$(grep -rn '\.unwrap()' crates/ --include="*.rs" | grep -v 'tests/' | grep -v 'benches/' | grep -v 'particle_poc/' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Check ratchets
        run: |
          set -e
          FAILED=0

          check_ratchet() {
            local name=$1 current=$2 baseline=$3
            if [ "$current" -gt "$baseline" ]; then
              echo "::error title=Quality Regression::$name regressed: $current > $baseline (baseline)"
              FAILED=1
            elif [ "$current" -lt "$baseline" ]; then
              echo "::notice title=Quality Improved::$name improved: $current < $baseline (baseline). Run update-baseline to ratchet down."
            else
              echo "::notice title=$name (ok)::$name: $current (baseline: $baseline)"
            fi
          }

          check_ratchet "test_count"      "${{ steps.tests.outputs.count }}"         "${{ steps.baseline.outputs.test_count }}"
          check_ratchet "smell_markers"   "${{ steps.smells.outputs.count }}"         "${{ steps.baseline.outputs.smell }}"
          check_ratchet "unsafe_blocks"   "${{ steps.unsafe_blocks.outputs.count }}"  "${{ steps.baseline.outputs.unsafe }}"
          check_ratchet "unwrap_in_prod"  "${{ steps.unwrap_count.outputs.count }}"   "${{ steps.baseline.outputs.unwrap }}"

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "::error::One or more quality metrics regressed. See above for details."
            echo "To intentionally increase a baseline, edit docs/QUALITY_BASELINE.ron overrides section with a reason."
            exit 1
          fi

          echo "::notice::All soft ratchets passed. Quality has not regressed."
