name: Quality

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: # Manual trigger

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Clippy
        run: cargo clippy --workspace --all-targets --keep-going -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions-rust-lang/audit@v1

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: lcov.info

  udeps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      - name: Check for unused dependencies
        run: cargo +nightly udeps --workspace --all-targets

  shaders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install naga-cli
        run: cargo install naga-cli --locked
      - name: Validate WGSL shaders
        run: |
          preamble="crates/engine_render/src/wgpu_renderer/bloom_preamble.wgsl"
          find crates -name '*.wgsl' | while read -r shader; do
            echo "Validating $shader"
            case "$shader" in
              *bloom_frag.wgsl|*bloom_composite.wgsl)
                tmp=$(mktemp /tmp/shader_XXXXXX.wgsl)
                cat "$preamble" "$shader" > "$tmp"
                naga "$tmp"
                rm "$tmp"
                ;;
              *)
                naga "$shader"
                ;;
            esac
          done

  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Check for dead code
        run: cargo build --workspace --all-targets
        env:
          RUSTFLAGS: "-D dead_code"

  duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install jscpd
        run: npm install -g jscpd
      - name: Detect duplicate code
        id: jscpd
        run: jscpd crates/ --pattern "**/*.rs" --min-tokens 50 --reporters consoleFull --output jscpd-report || echo "duplicates_found=true" >> "$GITHUB_OUTPUT"
      - name: Upload duplicate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jscpd-report
          path: jscpd-report/
      - name: Fail if duplicates found
        if: steps.jscpd.outputs.duplicates_found == 'true'
        run: exit 1
