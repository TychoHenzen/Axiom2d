[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
bevy_ecs = "0.16"
bytemuck = { version = "1.21", features = ["derive"] }
glam = "0.29"
pollster = "0.4"
thiserror = "2.0"
guillotiere = "0.6"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
wgpu = "24"
winit = "0.30"
