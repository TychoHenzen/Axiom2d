<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Verification Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
h1 { color: #e94560; margin-bottom: 16px; }
.loading { text-align: center; padding: 60px; color: #888; font-size: 1.2em; }
.error { color: #e94560; padding: 20px; background: #2a1a1e; border-radius: 8px; }
.tabs { display: flex; gap: 2px; margin-bottom: 20px; }
.tab { padding: 10px 20px; background: #16213e; cursor: pointer; border-radius: 4px 4px 0 0; user-select: none; }
.tab.active { background: #0f3460; color: white; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat { background: #16213e; padding: 15px; border-radius: 8px; text-align: center; }
.stat .value { font-size: 2em; font-weight: bold; color: #e94560; }
.stat .label { font-size: 0.9em; color: #a0a0b0; margin-top: 5px; }
table { width: 100%; border-collapse: collapse; margin-top: 16px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; }
th { background: #0f3460; position: sticky; top: 0; cursor: pointer; }
th:hover { background: #1a4a80; }
tr:hover { background: #1a1a3e; }
.green { color: #4ecca3; }
.yellow { color: #ffc107; }
.red { color: #e94560; }
.dim { color: #888; font-size: 0.85em; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.summary-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.summary-item { background: #16213e; padding: 10px 14px; border-radius: 6px; }
.summary-item .label { color: #a0a0b0; font-size: 0.8em; }
.details-row { display: none; }
.details-row.open { display: table-row; }
.details-row td { background: #0d1b33; padding: 12px 20px; border-bottom: 2px solid #1a3a5e; }
.details-row ul { list-style: none; }
.details-row li { padding: 3px 0; font-size: 0.9em; }
.expand-btn { cursor: pointer; color: #4ecca3; font-weight: bold; }
.clr-green { color: #4ecca3; }
.clr-yellow { color: #ffc107; }
.clr-red { color: #e94560; }
.filter-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.filter-row input, .filter-row select { padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #16213e; color: #e0e0e0; }
.filter-row label { color: #a0a0b0; font-size: 0.85em; }
.gauge { width: 120px; height: 120px; margin: 0 auto; }
</style>
</head>
<body>
<h1>Test Verification Dashboard</h1>
<div id="loading" class="loading">Loading manifest.json…</div>
<div id="error" class="error" style="display:none"></div>
<div id="content" style="display:none">
<div class="tabs">
<div class="tab active" onclick="switchTab('quality')">Test Quality</div>
<div class="tab" onclick="switchTab('coverage')">Coverage Gaps</div>
<div class="tab" onclick="switchTab('source')">Source Quality</div>
</div>
<div class="stats" id="summary-stats"></div>
<div id="quality" class="tab-content active"></div>
<div id="coverage" class="tab-content"></div>
<div id="source" class="tab-content"></div>
</div>

<script>
// ── helpers ──
function sc(n) { return n >= 8 ? 'green' : n >= 6.5 ? 'yellow' : 'red'; }
function clr(n) { return 'clr-' + sc(n); }

function sortTable(tbl, col, numeric) {
  const tbody = tbl.querySelector('tbody');
  const rows = [...tbody.querySelectorAll('tr:not(.details-row)')];
  rows.sort((a, b) => {
    const ca = a.cells[col].textContent, cb = b.cells[col].textContent;
    return numeric ? (parseFloat(cb) - parseFloat(ca)) : ca.localeCompare(cb);
  });
  for (const r of rows) tbody.appendChild(r);
}

// ── load ──
fetch('manifest.json')
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}: ${r.statusText}`); return r.json(); })
  .then(render)
  .catch(e => { document.getElementById('loading').style.display = 'none'; document.getElementById('error').style.display = 'block'; document.getElementById('error').textContent = 'Failed to load manifest.json: ' + e.message; });

function render(m) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  const files = m.files || {};
  const sq = m.source_quality || {};
  const cov = m.coverage || {};
  const cyc = m.cycle || {};
  const res = cyc.results || {};

  // ── summary stats ──
  const fileList = Object.entries(files);
  const total = fileList.length;
  const atTarget = fileList.filter(([,f]) => f.overall >= 8.0).length;
  const belowMin = fileList.filter(([,f]) => f.overall < 6.5).length;
  const avg = fileList.length ? (fileList.reduce((s, [,f]) => s + f.overall, 0) / fileList.length).toFixed(1) : '—';

  document.getElementById('summary-stats').innerHTML =
    `<div class="stat"><div class="value">${total}</div><div class="label">Test Files</div></div>
     <div class="stat"><div class="value">${avg}</div><div class="label">Avg Score /10</div></div>
     <div class="stat"><div class="value">${atTarget}/${total}</div><div class="label">At Target (≥8.0)</div></div>
     <div class="stat"><div class="value">${belowMin}</div><div class="label">Below Minimum (&lt;6.5)</div></div>`;

  // ── Test Quality tab ──
  const sorted = fileList.sort(([,a], [,b]) => a.overall - b.overall);
  let qhtml = `<div class="filter-row">
    <label>Min score: <input id="minScore" type="number" value="0" min="0" max="10" step="0.5" onchange="filterQuality()" style="width:70px"></label>
    <label>Max files: <input id="maxFiles" type="number" value="50" min="1" max="500" onchange="filterQuality()" style="width:70px"></label>
  </div>
  <table><thead><tr>
    <th onclick="sortTable(this.parentElement.parentElement.parentElement,0,false)">File</th>
    <th onclick="sortTable(this.parentElement.parentElement.parentElement,1,true)">Score</th>
    <th>AQ</th><th>D</th><th>I</th><th>CL</th><th>CD</th><th>SP</th><th>DG</th><th>AT</th>
  </tr></thead><tbody>`;

  for (const [path, f] of sorted) {
    const s = f.scores || {};
    const o = f.overall || 0;
    qhtml += `<tr data-score="${o}" class="quality-row">
      <td class="dim" style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${path}">${path}</td>
      <td class="${sc(o)}"><strong>${o.toFixed(1)}</strong></td>
      <td>${(s.assertion_quality||0).toFixed(1)}</td>
      <td>${(s.determinism||0).toFixed(1)}</td>
      <td>${(s.isolation||0).toFixed(1)}</td>
      <td>${(s.clarity||0).toFixed(1)}</td>
      <td>${(s.coverage_depth||0).toFixed(1)}</td>
      <td>${(s.speed||0).toFixed(1)}</td>
      <td>${(s.diagnostics||0).toFixed(1)}</td>
      <td>${(s.assertion_triviality||0).toFixed(1)}</td>
    </tr>`;
  }
  qhtml += '</tbody></table>';
  document.getElementById('quality').innerHTML = qhtml;

  window._qualityRows = () => [...document.querySelectorAll('.quality-row')];
  window.filterQuality = () => {
    const min = parseFloat(document.getElementById('minScore').value) || 0;
    const max = parseInt(document.getElementById('maxFiles').value) || 999;
    const rows = window._qualityRows();
    let shown = 0;
    for (const r of rows) {
      const score = parseFloat(r.dataset.score);
      r.style.display = (score >= min && shown < max) ? '' : 'none';
      if (score >= min) shown++;
    }
  };
  filterQuality();

  // ── Coverage tab ──
  const untested = cov.untested_files || [];
  const entryUntested = cov.entry_points_untested || [];
  const weak = cov.weakly_covered || [];
  const srcTotal = cov.total_source_files || 0;
  const testedCt = cov.tested || 0;
  const linePct = cov.overall_line_pct;
  const branchPct = cov.overall_branch_pct;
  const filePct = srcTotal ? (100 * testedCt / srcTotal).toFixed(1) : '—';

  let chtml = `<div class="summary-bar">
    <div class="summary-item"><span class="label">Source Files</span><br><strong>${srcTotal}</strong></div>
    <div class="summary-item"><span class="label">Tested (crate-level)</span><br><strong class="green">${testedCt} (${filePct}%)</strong></div>
    <div class="summary-item"><span class="label">Line Coverage</span><br><strong class="${linePct >= 70 ? 'green' : 'yellow'}">${linePct != null ? linePct.toFixed(1) + '%' : '—'}</strong></div>
    <div class="summary-item"><span class="label">Branch Coverage</span><br><strong>${branchPct != null ? branchPct.toFixed(1) + '%' : '—'}</strong></div>
  </div>`;

  if (untested.length) {
    chtml += '<h3>Untested source files</h3><table><thead><tr><th>File</th><th>Lines</th><th>Risk</th><th>Reason</th></tr></thead><tbody>';
    for (const u of untested) {
      chtml += `<tr><td class="dim">${u.path}</td><td>${u.lines||0}</td><td class="${u.risk==='high'?'red':u.risk==='medium'?'yellow':'green'}">${u.risk||'—'}</td><td class="dim">${u.reason||''}</td></tr>`;
    }
    chtml += '</tbody></table>';
  } else {
    chtml += '<p class="green">✓ All source files have matching test binaries (crate-level).</p>';
  }

  if (weak.length) {
    chtml += '<h3>Weakly covered (&lt;50% line)</h3><table><thead><tr><th>File</th><th>Lines</th><th>Line %</th><th>Branch %</th></tr></thead><tbody>';
    for (const w of weak) {
      chtml += `<tr><td class="dim">${w.path}</td><td>${w.lines||0}</td><td class="red">${w.line_coverage_pct!=null?w.line_coverage_pct.toFixed(1)+'%':'—'}</td><td>${w.branch_coverage_pct!=null?w.branch_coverage_pct.toFixed(1)+'%':'—'}</td></tr>`;
    }
    chtml += '</tbody></table>';
  }

  if (entryUntested.length) {
    chtml += '<h3>Entry points / binary crates (low risk)</h3><table><thead><tr><th>File</th><th>Lines</th><th>Note</th></tr></thead><tbody>';
    for (const e of entryUntested) {
      chtml += `<tr><td class="dim">${e.path}</td><td>${e.lines||0}</td><td class="dim">${e.reason||''}</td></tr>`;
    }
    chtml += '</tbody></table>';
  }

  document.getElementById('coverage').innerHTML = chtml;

  // ── Source Quality tab ──
  const sqEntries = Object.entries(sq).sort(([,a],[,b]) => {
    const amin = Math.min(a.observability?.score??10, a.brevity?.score??10);
    const bmin = Math.min(b.observability?.score??10, b.brevity?.score??10);
    return amin - bmin;
  });

  const sqStats = { obsBelow7: 0, brevBelow7: 0, obsBelow4: 0, brevBelow4: 0, total: sqEntries.length };
  for (const [,d] of sqEntries) {
    const o = d.observability?.score ?? 10;
    const b = d.brevity?.score ?? 10;
    if (o < 7) sqStats.obsBelow7++;
    if (b < 7) sqStats.brevBelow7++;
    if (o < 4) sqStats.obsBelow4++;
    if (b < 4) sqStats.brevBelow4++;
  }

  let shtml = `<div class="summary-bar">
    <div class="summary-item"><span class="label">Source Files</span><br><strong>${sqStats.total}</strong></div>
    <div class="summary-item"><span class="label">Observability ≥7</span><br><strong class="green">${sqStats.total - sqStats.obsBelow7}</strong></div>
    <div class="summary-item"><span class="label">Brevity ≥7</span><br><strong class="green">${sqStats.total - sqStats.brevBelow7}</strong></div>
    <div class="summary-item"><span class="label">Brevity &lt;4</span><br><strong class="${sqStats.brevBelow4?'red':'green'}">${sqStats.brevBelow4}</strong></div>
    <div class="summary-item"><span class="label">Obs &lt;4</span><br><strong class="${sqStats.obsBelow4?'red':'green'}">${sqStats.obsBelow4}</strong></div>
  </div>
  <table><thead><tr>
    <th>File</th><th>Obs</th><th>Brev</th><th>Lines</th><th>Fn</th><th>Issues</th>
  </tr></thead><tbody>`;

  for (const [path, d] of sqEntries) {
    const o = d.observability?.score ?? 10;
    const b = d.brevity?.score ?? 10;
    const ap = d.observability?.anti_patterns || [];
    const lf = d.brevity?.long_functions || [];
    const ue = d.brevity?.unnecessary_else_count || 0;
    const longLines = d.brevity?.long_lines || 0;
    const hcc = d.brevity?.high_complexity_functions || [];
    const tooLong = d.brevity?.file_too_long ? 'file>300 ' : '';
    const issues = [...ap.map(a => a.type||''), ...(lf.length ? [lf.length+' long fn'] : []), ...(ue ? [ue+' unnecessary else'] : []), ...(longLines ? [longLines+' long lines'] : []), ...(hcc.length ? [hcc.length+' CC>5'] : []), ...(tooLong ? [tooLong] : [])].join(', ') || '—';

    shtml += `<tr>
      <td class="dim" style="max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${path}">${path}</td>
      <td class="${clr(o)}">${o}</td>
      <td class="${clr(b)}">${b}</td>
      <td>${d.lines||0}</td>
      <td>${d.functions||0}</td>
      <td class="dim" style="font-size:0.8em">${issues}</td>
    </tr>`;
  }
  shtml += '</tbody></table>';
  document.getElementById('source').innerHTML = shtml;
}

function switchTab(name) {
  for (const t of document.querySelectorAll('.tab')) t.classList.toggle('active', false);
  for (const c of document.querySelectorAll('.tab-content')) c.classList.toggle('active', false);
  event.target.classList.add('active');
  document.getElementById(name).classList.add('active');
}
</script>
</body>
</html>
